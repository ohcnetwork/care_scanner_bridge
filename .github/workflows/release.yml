  #         cp build/linux/care-scanner-bridge.desktop AppDir/
  #         cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/care-scanner-bridge.png || true
  #         cp assets/icon.png AppDir/care-scanner-bridge.png || true
  #
