  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: care-scanner-bridge-linux.AppImage
  #         path: care-scanner-bridge-linux.AppImage

  release:
    needs: [create-macos-dmg, create-windows-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/care-scanner-bridge-macos.dmg/care-scanner-bridge-macos.dmg
            ./artifacts/care-scanner-bridge-windows-setup.exe/care-scanner-bridge-setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
