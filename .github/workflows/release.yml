name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            artifact: care-scanner-bridge-macos-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            artifact: care-scanner-bridge-macos-arm64
          # Linux build - coming soon
          # - os: ubuntu-latest
          #   goos: linux
          #   goarch: amd64
          #   ext: ""
          #   artifact: care-scanner-bridge-linux-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            artifact: care-scanner-bridge-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      # Linux dependencies - coming soon
      # - name: Install Linux dependencies
      #   if: matrix.goos == 'linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y gcc libgtk-3-dev libayatana-appindicator3-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          go build -ldflags="-s -w -X main.version=${VERSION}" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-macos-dmg:
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS AMD64 artifact
        uses: actions/download-artifact@v4
        with:
          name: care-scanner-bridge-macos-amd64
          path: ./dist/amd64

      - name: Download macOS ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: care-scanner-bridge-macos-arm64
          path: ./dist/arm64

      - name: Create Universal Binary
        run: |
          chmod +x ./dist/amd64/care-scanner-bridge-macos-amd64
          chmod +x ./dist/arm64/care-scanner-bridge-macos-arm64
          lipo -create -output ./dist/care-scanner-bridge ./dist/amd64/care-scanner-bridge-macos-amd64 ./dist/arm64/care-scanner-bridge-macos-arm64

      - name: Create App Bundle
        run: |
          mkdir -p "./Care Scanner Bridge.app/Contents/MacOS"
          mkdir -p "./Care Scanner Bridge.app/Contents/Resources"
          cp ./dist/care-scanner-bridge "./Care Scanner Bridge.app/Contents/MacOS/"
          cp build/darwin/Info.plist "./Care Scanner Bridge.app/Contents/"
          cp build/darwin/icon.icns "./Care Scanner Bridge.app/Contents/Resources/" || true

          # Make the binary executable
          chmod +x "./Care Scanner Bridge.app/Contents/MacOS/care-scanner-bridge"

          # Remove any quarantine attributes
          xattr -cr "./Care Scanner Bridge.app" || true

          # Ad-hoc sign the app with entitlements
          codesign --force --deep --sign - --entitlements build/darwin/entitlements.plist "./Care Scanner Bridge.app"

          # Verify the signature
          codesign --verify --verbose "./Care Scanner Bridge.app" || echo "Warning: Signature verification failed, but continuing..."

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG with custom background
        run: |
          # Create DMG with beautiful drag-and-drop UI
          create-dmg \
            --volname "Care Scanner Bridge" \
            --volicon "build/darwin/icon.icns" \
            --background "build/darwin/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 835 600 \
            --icon-size 128 \
            --icon "Care Scanner Bridge.app" 230 295 \
            --hide-extension "Care Scanner Bridge.app" \
            --app-drop-link 593 295 \
            --no-internet-enable \
            "care-scanner-bridge-macos.dmg" \
            "./Care Scanner Bridge.app" \
            || echo "DMG created (exit code $? is normal if icon positions couldn't be set)"

          # Verify DMG was created
          ls -la care-scanner-bridge-macos.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: care-scanner-bridge-macos.dmg
          path: care-scanner-bridge-macos.dmg

  create-windows-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: care-scanner-bridge-windows-amd64.exe
          path: ./dist

      - name: Create installer with Inno Setup
        run: |
          choco install innosetup -y
          iscc build/windows/installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: care-scanner-bridge-windows-setup.exe
          path: Output/care-scanner-bridge-setup.exe

  # Linux AppImage - coming soon
